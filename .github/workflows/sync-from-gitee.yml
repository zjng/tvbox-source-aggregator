name: Sync from Gitee
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须保留，给 Actions 推送权限
    steps:
      - name: 同步 Gitee 到 GitHub
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git clone --bare https://gitee.com/tengxiaobao/tvbox-source-aggregator.git upstream
          cd upstream
          git push --mirror https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
