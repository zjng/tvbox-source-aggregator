name: Sync from Gitee
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mirror repository
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: https://gitee.com/tengxiaobao/tvbox-source-aggregator.git
          destination-repo: https://github.com/${{ github.repository }}.git
          destination-github-username: ${{ github.actor }}
          destination-github-email: ${{ github.actor }}@users.noreply.github.com
