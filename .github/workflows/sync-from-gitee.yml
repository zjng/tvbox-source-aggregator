name: Sync from Gitee
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 同步 Gitee 到 GitHub（IP 直连版）
        run: |
          # 配置 Git 用户信息
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
          # 用 GitHub 的官方 IP 地址替换域名，绕过 DNS 解析问题
          echo "140.82.112.4 github.com" >> /etc/hosts
          
          # 克隆上游仓库
          git clone --bare https://gitee.com/tengxiaobao/tvbox-source-aggregator.git upstream
          cd upstream
          
          # 使用带令牌和 IP 地址的 URL 推送
          git push --mirror https://${{ secrets.GITHUB_TOKEN }}@140.82.112.4/${{ github.repository }}.git
